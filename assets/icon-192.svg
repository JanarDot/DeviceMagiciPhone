<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0f0d0a"/>
  <!-- Warm radial glow -->
  <radialGradient id="glow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#c4973f" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0f0d0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="192" height="192" fill="url(#glow)"/>
  <!-- Wand — thin diagonal line -->
  <line x1="68" y1="124" x2="120" y2="72" stroke="#c4973f" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Wand tip handle block -->
  <rect x="60" y="116" width="16" height="10" rx="2" fill="#7a5c24" transform="rotate(-45 68 121)"/>
  <!-- Sparkle star at tip -->
  <g transform="translate(120,72)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#c4973f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#c4973f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c4973f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#c4973f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Small scattered sparkles -->
  <circle cx="140" cy="58" r="1.5" fill="#c4973f" opacity="0.6"/>
  <circle cx="130" cy="48" r="1" fill="#ddb05c" opacity="0.5"/>
  <circle cx="148" cy="70" r="1" fill="#c4973f" opacity="0.4"/>
</svg>
