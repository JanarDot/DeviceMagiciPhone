<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0f0d0a"/>
  <!-- Warm radial glow -->
  <radialGradient id="glow" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#c4973f" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0f0d0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- Wand -->
  <line x1="180" y1="332" x2="320" y2="192" stroke="#c4973f" stroke-width="9" stroke-linecap="round"/>
  <!-- Wand handle -->
  <rect x="158" y="314" width="44" height="26" rx="5" fill="#7a5c24" transform="rotate(-45 180 327)"/>
  <!-- Sparkle at tip -->
  <g transform="translate(320,192)">
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#c4973f" stroke-width="5" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#c4973f" stroke-width="5" stroke-linecap="round"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#c4973f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="#c4973f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#ddb05c"/>
  </g>
  <!-- Scattered sparkles -->
  <circle cx="372" cy="158" r="4" fill="#c4973f" opacity="0.6"/>
  <circle cx="348" cy="130" r="2.5" fill="#ddb05c" opacity="0.5"/>
  <circle cx="390" cy="186" r="2.5" fill="#c4973f" opacity="0.4"/>
  <circle cx="358" cy="148" r="1.5" fill="#c4973f" opacity="0.3"/>
</svg>
